<div class="page-container">
  <h1>Propiedades</h1>

  <div class="action-bar">
    <button class="btn-create" (click)="showForm = !showForm">
      {{ showForm ? 'Cerrar Formulario' : '+ Nueva Propiedad' }}
    </button>
  </div>

  <div *ngIf="showForm" class="form-section">
    <app-propiedad-form (submitted)="onFormSubmit($event)"></app-propiedad-form>
  </div>

  <div class="content-grid">
    <div class="filters-section">
      <app-propiedad-filtros (filtrosChange)="onFiltrosChange($event)"></app-propiedad-filtros>
    </div>

    <div class="list-section">
      <div class="propiedades-grid">
        <app-propiedad-card 
          *ngFor="let propiedad of propiedades" 
          [propiedad]="propiedad"
        ></app-propiedad-card>
      </div>

      <div *ngIf="propiedades.length === 0" class="empty-state">
        <p>No hay propiedades para mostrar</p>
      </div>
    </div>
  </div>
</div>
