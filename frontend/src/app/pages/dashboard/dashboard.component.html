<div class="dashboard-layout">
  <div class="content">
    <h1>Dashboard</h1>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="icon">🏠</div>
        <div class="stat-info">
          <h3>Propiedades</h3>
          <p class="stat-value">{{ stats.propiedades }}</p>
        </div>
      </div>

      <div class="stat-card">
        <div class="icon">👥</div>
        <div class="stat-info">
          <h3>Leads</h3>
          <p class="stat-value">{{ stats.leads }}</p>
        </div>
      </div>

      <div class="stat-card">
        <div class="icon">📅</div>
        <div class="stat-info">
          <h3>Visitas</h3>
          <p class="stat-value">{{ stats.visitas }}</p>
        </div>
      </div>

      <div class="stat-card">
        <div class="icon">📄</div>
        <div class="stat-info">
          <h3>Contratos</h3>
          <p class="stat-value">{{ stats.contratos }}</p>
        </div>
      </div>
    </div>

    <div class="dashboard-sections">
      <div class="section">
        <h2>Propiedades Recientes</h2>
        <p>Cargando datos...</p>
      </div>

      <div class="section">
        <h2>Leads Activos</h2>
        <p>Cargando datos...</p>
      </div>
    </div>
  </div>
</div>
