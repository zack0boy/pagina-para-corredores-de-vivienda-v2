<div class="page-container">
  <h1>Usuarios</h1>
  <div class="action-bar">
    <button class="btn-create" (click)="showForm = !showForm">
      {{ showForm ? 'Cerrar' : '+ Nuevo Usuario' }}
    </button>
  </div>
  <div *ngIf="showForm"><app-usuario-form (submitted)="onFormSubmit($event)"></app-usuario-form></div>
  <table *ngIf="usuarios.length > 0" class="data-table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>Rol</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let usuario of usuarios">
        <td>{{ usuario.nombre }} {{ usuario.apellido }}</td>
        <td>{{ usuario.email }}</td>
        <td>{{ usuario.rol }}</td>
        <td>
          <button class="btn-edit">Editar</button>
          <button class="btn-delete">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
