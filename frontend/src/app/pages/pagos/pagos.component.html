<div class="page-container">
  <h1>Pagos</h1>
  <div class="action-bar">
    <button class="btn-create" (click)="showForm = !showForm">
      {{ showForm ? 'Cerrar' : '+ Nuevo Pago' }}
    </button>
  </div>
  <div *ngIf="showForm"><app-pago-form (submitted)="onFormSubmit($event)"></app-pago-form></div>
  <div *ngIf="pagos.length === 0" class="empty-state"><p>No hay pagos registrados</p></div>
</div>
