<div class="page-container">
  <h1>Contratos</h1>
  <div class="action-bar">
    <button class="btn-create" (click)="showForm = !showForm">
      {{ showForm ? 'Cerrar' : '+ Nuevo Contrato' }}
    </button>
  </div>
  <div *ngIf="showForm"><app-contrato-form (submitted)="onFormSubmit($event)"></app-contrato-form></div>
  <div *ngIf="contratos.length === 0" class="empty-state"><p>No hay contratos</p></div>
</div>
