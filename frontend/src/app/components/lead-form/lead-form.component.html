<form [formGroup]="leadForm" (ngSubmit)="onSubmit()" class="form-container">
  <h3>Nuevo Lead</h3>

  <div class="form-group">
    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" formControlName="nombre" placeholder="Nombre completo">
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" formControlName="email" placeholder="correo@ejemplo.com">
  </div>

  <div class="form-group">
    <label for="telefono">Teléfono</label>
    <input type="tel" id="telefono" formControlName="telefono" placeholder="Número de teléfono">
  </div>

  <div class="form-group">
    <label for="mensaje">Mensaje</label>
    <textarea id="mensaje" formControlName="mensaje" placeholder="Mensaje del cliente"></textarea>
  </div>

  <button type="submit" class="btn-submit">Guardar Lead</button>
</form>
