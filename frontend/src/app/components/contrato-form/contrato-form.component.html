<form [formGroup]="contratoForm" (ngSubmit)="onSubmit()" class="form-container">
  <h3>Nuevo Contrato</h3>

  <div class="form-group">
    <label for="numero_contrato">Número de Contrato</label>
    <input type="text" id="numero_contrato" formControlName="numero_contrato" placeholder="Número">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="propiedad_id">Propiedad</label>
      <input type="text" id="propiedad_id" formControlName="propiedad_id" placeholder="ID Propiedad">
    </div>
    <div class="form-group">
      <label for="cliente_id">Cliente</label>
      <input type="text" id="cliente_id" formControlName="cliente_id" placeholder="ID Cliente">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="fecha_inicio">Fecha Inicio</label>
      <input type="date" id="fecha_inicio" formControlName="fecha_inicio">
    </div>
    <div class="form-group">
      <label for="fecha_fin">Fecha Fin</label>
      <input type="date" id="fecha_fin" formControlName="fecha_fin">
    </div>
  </div>

  <div class="form-group">
    <label for="valor_contrato">Valor Contrato</label>
    <input type="number" id="valor_contrato" formControlName="valor_contrato" placeholder="Valor">
  </div>

  <button type="submit" class="btn-submit">Guardar Contrato</button>
</form>
