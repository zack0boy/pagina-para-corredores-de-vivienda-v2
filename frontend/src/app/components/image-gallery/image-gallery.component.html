<div class="gallery-container">
  <h3 class="gallery-title">{{ title }}</h3>
  
  <div class="gallery-grid" *ngIf="images.length > 0; else emptyGallery">
    <div class="gallery-item" *ngFor="let image of images; let i = index" 
         (click)="onImageClick(image, i)">
      <img [src]="image.url || image" [alt]="'Imagen ' + (i + 1)" class="gallery-img">
      <div class="image-overlay">
        <button class="btn-delete" (click)="onDelete(image, $event)" title="Eliminar">🗑️</button>
      </div>
    </div>
  </div>

  <ng-template #emptyGallery>
    <div class="empty-gallery">
      <p>No hay imágenes</p>
    </div>
  </ng-template>

  <!-- Modal para imagen grande -->
  <div class="modal" *ngIf="selectedImage" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <button class="modal-close" (click)="closeModal()">✕</button>
      
      <img [src]="selectedImage.url || selectedImage" 
           [alt]="'Imagen ' + (selectedIndex + 1)" 
           class="modal-image">
      
      <div class="modal-controls">
        <button class="btn btn-nav" (click)="previousImage()" [disabled]="selectedIndex === 0">
          ← Anterior
        </button>
        <span class="image-counter">{{ selectedIndex + 1 }} / {{ images.length }}</span>
        <button class="btn btn-nav" (click)="nextImage()" [disabled]="selectedIndex === images.length - 1">
          Siguiente →
        </button>
      </div>
    </div>
  </div>
</div>
