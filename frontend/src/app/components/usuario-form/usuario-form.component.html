<form [formGroup]="usuarioForm" (ngSubmit)="onSubmit()" class="form-container">
  <h3>Nuevo Usuario</h3>

  <div class="form-row">
    <div class="form-group">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" formControlName="nombre" placeholder="Nombre">
    </div>
    <div class="form-group">
      <label for="apellido">Apellido</label>
      <input type="text" id="apellido" formControlName="apellido" placeholder="Apellido">
    </div>
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" formControlName="email" placeholder="correo@ejemplo.com">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="telefono">Teléfono</label>
      <input type="tel" id="telefono" formControlName="telefono" placeholder="Teléfono">
    </div>
    <div class="form-group">
      <label for="rol">Rol</label>
      <select id="rol" formControlName="rol">
        <option value="">Seleccionar Rol</option>
        <option value="CORREDOR">Corredor</option>
        <option value="ADMIN_EMPRESA">Admin Empresa</option>
        <option value="SUPER_ADMIN">Super Admin</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="password">Contraseña</label>
    <input type="password" id="password" formControlName="password" placeholder="Contraseña">
  </div>

  <button type="submit" class="btn-submit">Guardar Usuario</button>
</form>
